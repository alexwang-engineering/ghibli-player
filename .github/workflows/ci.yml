name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: node -e "JSON.parse(require('fs').readFileSync('chrome-extension/manifest.json'))"
      - run: node -e "const m=require('./chrome-extension/manifest.json'); if (m.host_permissions || m.content_scripts || !m.permissions.includes('activeTab')) process.exit(1)"
      - run: node --check chrome-extension/background.js
      - run: node --check chrome-extension/content.js
      - run: node --check chrome-extension/popup.js
